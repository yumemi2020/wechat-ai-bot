version: '3.8'

# 與 WeChatPadProMAX 同網段通訊時，需先建立外部網路（由 PadPro 安裝腳本建立，或手動執行）：
#   docker network create wechatpadpromax_wechat_net
# 若暫無 PadPro，可註解各服務的 wechatpadpromax_wechat_net 區塊，或參考 deploy/docker-compose.with-padpro.yml。

services:
  db:
    image: mariadb:10.11
    container_name: wechat_ai_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: wechat_ai
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - default
      - wechatpadpromax_wechat_net

  wechat_ai_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wechat_ai_bot
    depends_on:
      - db
    restart: always
    ports:
      - "9950:8000"
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - default
      - wechatpadpromax_wechat_net

  frontend:
    image: node:18-alpine
    container_name: wechat_ai_frontend
    restart: always
    ports:
      - "9960:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - wechat_ai_bot
    networks:
      - default
      - wechatpadpromax_wechat_net

networks:
  wechatpadpromax_wechat_net:
    external: true
